<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turdle</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://db.onlinewebfonts.com/c/4789cf828c01b22acb9b2b73ee91aa0d?family=NYTKarnakCondensed" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div id="lobby-screen">
      <h1>Turdle</h1>
      <button id="create-btn">Create Private Room</button>
      <p>— OR —</p>
      <input
        type="text"
        id="room-input"
        placeholder="Enter 4-Letter Code"
        maxlength="4"
      />
      <button id="join-btn">Join Room</button>
    </div>

    <div id="game-screen" style="display: none;">
        <h2>Room Code: <span id="display-room-code"></span></h2>
        <p id="status-message">Waiting for an opponent to hop in...</p>

        <button id="leave-btn">Leave Room</button>
        
        <div class="arena">
            <div class="board-container">
                <h3>Your Grid 🐇</h3>
                <div id="game-board"></div>
            </div>
            
            <div class="board-container">
                <h3>Opponent Progress 🐢</h3>
                <div id="opponent-board"></div>
            </div>
        </div>

        <div id="keyboard-container">
            <div class="keyboard-row" id="kb-row-1"></div>
            <div class="keyboard-row" id="kb-row-2"></div>
            <div class="keyboard-row" id="kb-row-3"></div>
        </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
